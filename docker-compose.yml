services:
  db:
    image: postgres:16-alpine
    container_name: linkapro_db
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 10s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: linkapro_redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  django:
    build:
      context: .
      dockerfile: Dockerfile.django
    container_name: linkapro_django
    command: >
      sh -c "python manage.py migrate &&
             gunicorn django_app.wsgi:application --bind 0.0.0.0:8000 --workers 3 --timeout 120"
    volumes:
      - .:/app
      - static_volume:/app/static
      - media_volume:/app/media
    ports:
      - "8000:8000"
    environment:
      DJANGO_SETTINGS_MODULE: ${DJANGO_SETTINGS_MODULE}
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY}
      DJANGO_DEBUG: ${DJANGO_DEBUG}
      TOKEN_ENV: ${TOKEN_ENV}
      ACCEPT_LEGACY_PAYMENT_ENV_TOKENS: ${ACCEPT_LEGACY_PAYMENT_ENV_TOKENS}
      DJANGO_DATABASE_URL: postgres://${DB_USER}:${DB_PASSWORD}@db:5432/${DB_NAME}
      REDIS_URL: ${REDIS_URL}
      DATABASE_SSL: "false"
      FASTAPI_INTERNAL_URL: ${FASTAPI_INTERNAL_URL}
      FASTAPI_INTERNAL_SHARED_SECRET: ${FASTAPI_INTERNAL_SHARED_SECRET}
      FRONTEND_URL: ${FRONTEND_URL}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS}
      CSRF_TRUSTED_ORIGINS: ${CSRF_TRUSTED_ORIGINS}
      PAYMENT_ENV: ${PAYMENT_ENV}
      VAULT_ADDR: ${VAULT_ADDR}
      VAULT_ROLE_ID: ${VAULT_ROLE_ID}
      VAULT_SECRET_ID: ${VAULT_SECRET_ID}
      VAULT_TRANSIT_KEY_NAME: ${VAULT_TRANSIT_KEY_NAME}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/admin/login/').read()"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  celery_worker:
    build:
      context: .
      dockerfile: Dockerfile.django
    container_name: linkapro_celery_worker
    command: celery -A tasks.celery worker --loglevel=info
    volumes:
      - .:/app
      - static_volume:/app/static
      - media_volume:/app/media
    environment:
      DJANGO_SETTINGS_MODULE: ${DJANGO_SETTINGS_MODULE}
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY}
      DJANGO_DEBUG: ${DJANGO_DEBUG}
      TOKEN_ENV: ${TOKEN_ENV}
      ACCEPT_LEGACY_PAYMENT_ENV_TOKENS: ${ACCEPT_LEGACY_PAYMENT_ENV_TOKENS}
      DJANGO_DATABASE_URL: postgres://${DB_USER}:${DB_PASSWORD}@db:5432/${DB_NAME}
      REDIS_URL: ${REDIS_URL}
      DATABASE_SSL: "false"
      FASTAPI_INTERNAL_URL: ${FASTAPI_INTERNAL_URL}
      FASTAPI_INTERNAL_SHARED_SECRET: ${FASTAPI_INTERNAL_SHARED_SECRET}
      PAYMENT_ENV: ${PAYMENT_ENV}
      VAULT_ADDR: ${VAULT_ADDR}
      VAULT_ROLE_ID: ${VAULT_ROLE_ID}
      VAULT_SECRET_ID: ${VAULT_SECRET_ID}
      VAULT_TRANSIT_KEY_NAME: ${VAULT_TRANSIT_KEY_NAME}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  celery_beat:
    build:
      context: .
      dockerfile: Dockerfile.django
    container_name: linkapro_celery_beat
    command: celery -A tasks.celery beat --loglevel=info
    volumes:
      - .:/app
      - static_volume:/app/static
      - media_volume:/app/media
    environment:
      DJANGO_SETTINGS_MODULE: ${DJANGO_SETTINGS_MODULE}
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY}
      DJANGO_DEBUG: ${DJANGO_DEBUG}
      TOKEN_ENV: ${TOKEN_ENV}
      ACCEPT_LEGACY_PAYMENT_ENV_TOKENS: ${ACCEPT_LEGACY_PAYMENT_ENV_TOKENS}
      DJANGO_DATABASE_URL: postgres://${DB_USER}:${DB_PASSWORD}@db:5432/${DB_NAME}
      REDIS_URL: ${REDIS_URL}
      DATABASE_SSL: "false"
      FASTAPI_INTERNAL_URL: ${FASTAPI_INTERNAL_URL}
      FASTAPI_INTERNAL_SHARED_SECRET: ${FASTAPI_INTERNAL_SHARED_SECRET}
      PAYMENT_ENV: ${PAYMENT_ENV}
      VAULT_ADDR: ${VAULT_ADDR}
      VAULT_ROLE_ID: ${VAULT_ROLE_ID}
      VAULT_SECRET_ID: ${VAULT_SECRET_ID}
      VAULT_TRANSIT_KEY_NAME: ${VAULT_TRANSIT_KEY_NAME}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  fastapi:
    build:
      context: .
      dockerfile: Dockerfile.fastapi
    container_name: linkapro_fastapi
    command: uvicorn fastapi_app.main:app --host 0.0.0.0 --port 8001 --proxy-headers
    volumes:
      - .:/app
    ports:
      - "8001:8001"
    environment:
      FASTAPI_DATABASE_URL: postgresql+asyncpg://${DB_USER}:${DB_PASSWORD}@db:5432/${DB_NAME}
      REDIS_URL: ${REDIS_URL}
      FASTAPI_CORS_ORIGINS: ${FASTAPI_CORS_ORIGINS}
      FASTAPI_INTERNAL_SHARED_SECRET: ${FASTAPI_INTERNAL_SHARED_SECRET}
      FASTAPI_ENV: ${FASTAPI_ENV}
      FASTAPI_SCHEMA_BOOTSTRAP: ${FASTAPI_SCHEMA_BOOTSTRAP}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8001/openapi.json').read()"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  nginx:
    image: nginx:alpine
    container_name: linkapro_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
      - static_volume:/static:ro
      - media_volume:/media:ro
    depends_on:
      django:
        condition: service_healthy
      fastapi:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
  static_volume:
  media_volume:
