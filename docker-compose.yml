services:
  db:
    image: postgres:16-alpine
    container_name: linkapro_db
    environment:
      POSTGRES_USER: ${DB_USER:-linkapro_admin}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-linkapro_password}
      POSTGRES_DB: ${DB_NAME:-linkapro}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-linkapro_admin} -d ${DB_NAME:-linkapro}"]
      interval: 5s
      timeout: 10s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: linkapro_redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  django:
    build:
      context: .
      dockerfile: Dockerfile.django
    container_name: linkapro_django
    command: >
      sh -c "python manage.py migrate &&
             python manage.py collectstatic --noinput &&
             gunicorn django_app.wsgi:application --bind 0.0.0.0:8000 --workers 3 --timeout 120"
    volumes:
      - .:/app
      - static_volume:/app/static
      - media_volume:/app/media
    ports:
      - "8000:8000"
    environment:
      DJANGO_SETTINGS_MODULE: django_app.settings.production
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:-change-me-in-production}
      DJANGO_DEBUG: ${DJANGO_DEBUG:-False}
      DB_NAME: ${DB_NAME:-linkapro}
      DB_USER: ${DB_USER:-linkapro_admin}
      DB_PASSWORD: ${DB_PASSWORD:-linkapro_password}
      DB_HOST: db
      DB_PORT: "5432"
      REDIS_URL: redis://redis:6379/0
      DATABASE_SSL: "false"
      FASTAPI_INTERNAL_URL: http://fastapi:8001
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:3000,http://127.0.0.1:3000}
      CSRF_TRUSTED_ORIGINS: ${CSRF_TRUSTED_ORIGINS:-http://localhost:3000,http://127.0.0.1:3000}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/admin/login/').read()"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  celery_worker:
    build:
      context: .
      dockerfile: Dockerfile.django
    container_name: linkapro_celery_worker
    command: celery -A tasks worker --loglevel=info
    volumes:
      - .:/app
      - static_volume:/app/static
      - media_volume:/app/media
    environment:
      DJANGO_SETTINGS_MODULE: django_app.settings.production
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:-change-me-in-production}
      DJANGO_DEBUG: ${DJANGO_DEBUG:-False}
      DB_NAME: ${DB_NAME:-linkapro}
      DB_USER: ${DB_USER:-linkapro_admin}
      DB_PASSWORD: ${DB_PASSWORD:-linkapro_password}
      DB_HOST: db
      DB_PORT: "5432"
      REDIS_URL: redis://redis:6379/0
      DATABASE_SSL: "false"
      FASTAPI_INTERNAL_URL: http://fastapi:8001
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  celery_beat:
    build:
      context: .
      dockerfile: Dockerfile.django
    container_name: linkapro_celery_beat
    command: celery -A tasks beat --loglevel=info
    volumes:
      - .:/app
      - static_volume:/app/static
      - media_volume:/app/media
    environment:
      DJANGO_SETTINGS_MODULE: django_app.settings.production
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:-change-me-in-production}
      DJANGO_DEBUG: ${DJANGO_DEBUG:-False}
      DB_NAME: ${DB_NAME:-linkapro}
      DB_USER: ${DB_USER:-linkapro_admin}
      DB_PASSWORD: ${DB_PASSWORD:-linkapro_password}
      DB_HOST: db
      DB_PORT: "5432"
      REDIS_URL: redis://redis:6379/0
      DATABASE_SSL: "false"
      FASTAPI_INTERNAL_URL: http://fastapi:8001
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  fastapi:
    build:
      context: .
      dockerfile: Dockerfile.fastapi
    container_name: linkapro_fastapi
    command: uvicorn fastapi_app.main:app --host 0.0.0.0 --port 8001 --proxy-headers
    volumes:
      - .:/app
    ports:
      - "8001:8001"
    environment:
      DATABASE_URL: postgresql+asyncpg://${DB_USER:-linkapro_admin}:${DB_PASSWORD:-linkapro_password}@db:5432/${DB_NAME:-linkapro}
      REDIS_URL: redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8001/openapi.json').read()"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  nginx:
    image: nginx:alpine
    container_name: linkapro_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
      - static_volume:/static:ro
      - media_volume:/media:ro
    depends_on:
      django:
        condition: service_healthy
      fastapi:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
  static_volume:
  media_volume:
