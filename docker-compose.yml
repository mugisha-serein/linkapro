services:
  redis:
    image: redis:7-alpine
    container_name: linkapro_redis
    ports:
      - "6379:6379"
    restart: unless-stopped

  django:
    build:
      context: .
      dockerfile: Dockerfile.django
    container_name: linkapro_django
    command: >
      sh -c "python manage.py migrate &&
             python manage.py migrate &&
             gunicorn django_app.wsgi:application --bind 0.0.0.0:8000"
    volumes:
      - .:/app

    ports:
      - "8000:8000"
    environment:
      - DJANGO_SETTINGS_MODULE=django_app.settings.production
      - DB_HOST=host.docker.internal   # Connect to host PostgreSQL
      - DB_PORT=5432
      - REDIS_URL=redis://redis:6379/0
    env_file:
      - .env
    depends_on:
      - redis
    extra_hosts:
      - "host.docker.internal:host-gateway"   # Required for Linux
    restart: unless-stopped

  celery_worker:
    build:
      context: .
      dockerfile: Dockerfile.django
    container_name: linkapro_celery_worker
    command: celery -A tasks worker --loglevel=info
    volumes:
      - .:/app
    environment:
      - DJANGO_SETTINGS_MODULE=django_app.settings.production
      - DB_HOST=host.docker.internal
      - DB_PORT=5432
      - REDIS_URL=redis://redis:6379/0
    env_file:
      - .env
    depends_on:
      - redis
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  celery_beat:
    build:
      context: .
      dockerfile: Dockerfile.django
    container_name: linkapro_celery_beat
    command: celery -A tasks beat --loglevel=info
    volumes:
      - .:/app
    environment:
      - DJANGO_SETTINGS_MODULE=django_app.settings.production
      - DB_HOST=host.docker.internal
      - DB_PORT=5432
      - REDIS_URL=redis://redis:6379/0
    env_file:
      - .env
    depends_on:
      - redis
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  fastapi:
    build:
      context: .
      dockerfile: Dockerfile.fastapi
    container_name: linkapro_fastapi
    command: uvicorn fastapi_app.main:app --host 0.0.0.0 --port 8001 --reload
    volumes:
      - .:/app
    ports:
      - "8001:8001"
    environment:
      - DATABASE_URL=postgresql+asyncpg://evplan_user:evplan_password@host.docker.internal:5432/evplan
      - REDIS_URL=redis://redis:6379/0
    env_file:
      - .env
    depends_on:
      - redis
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

volumes:
  static_volume:
  media_volume: