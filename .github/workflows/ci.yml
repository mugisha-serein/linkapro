name: CI

on:
  pull_request:
  push:
    branches: [main]

env:
  PYTHON_VERSION: "3.12"

jobs:
  lint-and-typecheck:
    name: Static analysis (all layers)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - run: pip install ruff mypy
      - run: pip install -r requirements/test.txt
      - name: Ruff lint
        run: ruff check domain application infrastructure django_app fastapi_app
      - name: Ruff format check
        run: ruff format --check domain application infrastructure django_app fastapi_app
      - name: Mypy (domain + application only — pure layers, no Django/FastAPI runtime deps)
        run: mypy domain application --ignore-missing-imports

  domain:
    name: Domain layer (pure, no DB)
    runs-on: ubuntu-latest
    needs: lint-and-typecheck
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - run: pip install -r requirements/test.txt
      - run: python -m compileall domain
      - run: python -m pytest tests/domain -q --cov=domain --cov-fail-under=85

  application:
    name: Application layer (pure, no DB)
    runs-on: ubuntu-latest
    needs: domain
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - run: pip install -r requirements/test.txt
      - run: python -m compileall application
      - run: python -m pytest tests/application -q --cov=application --cov-fail-under=80

  infrastructure-and-django:
    name: Infrastructure + Django app (needs Postgres/Redis)
    runs-on: ubuntu-latest
    needs: application
    services:
      postgres:
        image: postgres:16
        env: { POSTGRES_PASSWORD: postgres, POSTGRES_DB: linkapro_test }
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready --health-interval 10s --health-timeout 5s --health-retries 5
      redis:
        image: redis:7
        ports: ["6379:6379"]
    env:
      DJANGO_SETTINGS_MODULE: django_app.settings.test
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/linkapro_test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - run: pip install -r requirements/production.txt -r requirements/test.txt
      - name: Django system check
        run: python manage.py check
      - name: Migrations check (catch missing/out-of-sync migrations before prod)
        run: python manage.py makemigrations --check --dry-run
      - run: python -m pytest tests/infrastructure tests/django_app -q --cov=infrastructure --cov=django_app --cov-fail-under=75

  fastapi_app:
    name: FastAPI marketplace layer (needs its own DB)
    runs-on: ubuntu-latest
    needs: application
    services:
      postgres:
        image: postgres:16
        env: { POSTGRES_PASSWORD: postgres, POSTGRES_DB: linkapro_fastapi_test }
        ports: ["5432:5432"]
    env:
      FASTAPI_DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/linkapro_fastapi_test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - run: pip install -r requirements/fastapi.txt -r requirements/test.txt
      - run: python -m pytest tests/fastapi_app -q --cov=fastapi_app --cov-fail-under=75

  docker-build:
    name: Docker images build cleanly
    runs-on: ubuntu-latest
    needs: [infrastructure-and-django, fastapi_app]
    steps:
      - uses: actions/checkout@v4
      - run: docker build -f Dockerfile.django -t linkapro-django:ci .
      - run: docker build -f Dockerfile.fastapi -t linkapro-fastapi:ci .

  all-checks-passed:
    name: Required status check
    runs-on: ubuntu-latest
    needs: [lint-and-typecheck, domain, application, infrastructure-and-django, fastapi_app, docker-build]
    steps:
      - run: echo "All layers passed."