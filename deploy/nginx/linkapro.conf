# Nginx config for Linkapro Django app
# Place this in /etc/nginx/sites-available/linkapro.conf and symlink to /etc/nginx/sites-enabled/

upstream linkapro_app {
    server 127.0.0.1:8000;
}

server {
    listen 80;
    server_name linkapro.example.com;

    # Redirect all HTTP traffic to HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name linkapro.example.com;

    # Replace these paths with your Let's Encrypt or custom cert locations
    ssl_certificate /etc/letsencrypt/live/linkapro.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/linkapro.example.com/privkey.pem;

    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_ciphers HIGH:!aNULL:!MD5;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options nosniff;
    add_header X-Frame-Options DENY;
    add_header X-XSS-Protection "1; mode=block";

    access_log /var/log/nginx/linkapro.access.log;
    error_log /var/log/nginx/linkapro.error.log;

    client_max_body_size 100m;

    location /static/ {
        alias /var/www/linkapro/staticfiles/;
    }

    location /media/ {
        alias /var/www/linkapro/media/;
    }

    location / {
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
        proxy_redirect off;
        proxy_pass http://linkapro_app;
        proxy_read_timeout 120;
        proxy_connect_timeout 30;
        proxy_send_timeout 120;
    }
}
