[pytest]

DJANGO_SETTINGS_MODULE = config.settings
python_files = tests.py test_*.py *_tests.py

testpaths =
    tests/domain
    tests/application
    tests/infrastructure
    tests/interfaces

addopts =
    --strict-markers
    --strict-config
    --tb=short
    --disable-warnings
    -ra

markers =
    domain: Pure domain tests (no Django, no DB)
    application: Use case orchestration tests
    infrastructure: DB / Redis / external integration tests
    interface: API / DRF tests
    slow: Slow tests (integration, external APIs)
    security: Security-related tests
    e2e: End-to-end tests

log_cli = true
log_cli_level = INFO
